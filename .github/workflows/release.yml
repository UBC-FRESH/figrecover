name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      skip-publish:
        description: "Build and verify only; do not publish"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,pdf,release]'

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Build documentation
        run: sphinx-build -b html docs _build/html -W

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: figrecover-release-dist
          path: dist/*

      - name: Publish to TestPyPI
        if: ${{ inputs.target == 'testpypi' && !inputs.skip-publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ inputs.target == 'pypi' && !inputs.skip-publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
